<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primes & Zooms — New Arrivals Notice Board</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  @page {
    size: 297mm 420mm;
    margin: 0;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    width: 1123px;
    height: 1587px;
    overflow: hidden;
  }

  body {
    width: 1123px;
    height: 1587px;
    font-family: 'Open Sans', sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 0;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .poster {
    width: 1123px;
    height: 1587px;
    display: flex;
    flex-direction: column;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  /* ─── HEADER ─── */
  .header {
    background: #cb1513;
    height: 140px;
    padding: 0 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 45px;
    flex-shrink: 0;
  }

  .header .logo-img {
    height: 90px;
    width: auto;
  }

  .header .brand-text {
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.3;
  }

  /* ─── TITLE ─── */
  .title-section {
    text-align: center;
    padding: 60px 80px 20px;
    flex-shrink: 0;
  }

  .title-section h1 {
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 700;
    font-size: 72px;
    color: #cb1513;
    text-transform: uppercase;
    letter-spacing: 4px;
    line-height: 1;
  }

  .title-section .sub {
    font-family: 'Open Sans', sans-serif;
    font-weight: 400;
    font-size: 18px;
    color: #777;
    margin-top: 16px;
  }

  .divider {
    width: 50%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #cb1513, transparent);
    margin: 24px auto 40px;
    flex-shrink: 0;
  }

  /* ─── SLOTS ─── */
  .slots {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
    padding: 0 80px;
  }

  .slot {
    flex: 1;
    display: flex;
    align-items: stretch;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    overflow: hidden;
    min-height: 170px;
    background: #fafafa;
  }

  .slot-num {
    background: #cb1513;
    color: #fff;
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 700;
    font-size: 36px;
    width: 85px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .slot-body {
    flex: 1;
    padding: 24px 38px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .slot-label {
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .slot-name {
    font-family: 'Open Sans', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #333;
    line-height: 1.2;
    border-bottom: 1.5px dashed #ccc;
    padding-bottom: 10px;
    min-height: 40px;
  }

  .slot-sub {
    font-family: 'Open Sans', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #888;
    margin-top: 10px;
    min-height: 22px;
  }

  /* ─── FOOTER ─── */
  .footer {
    background: #333;
    height: 80px;
    padding: 0 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .footer .url {
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 600;
    font-size: 20px;
    color: #cb1513;
    letter-spacing: 0.5px;
  }

  .footer .info {
    font-family: 'Open Sans', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: #999;
    text-align: right;
    line-height: 1.6;
  }

  /* ─── PRINT ─── */
  @media print {
    html, body, .poster {
      width: 297mm;
      height: 420mm;
    }
  }
</style>
</head>
<body>
  <div class="poster">

    <!-- HEADER -->
    <div class="header">
      <div class="brand-text">Primes &amp; Zooms</div>
    </div>

    <!-- TITLE -->
    <div class="title-section">
      <h1>New Arrivals</h1>
      <div class="sub">Fresh gear just added to our rental inventory</div>
    </div>

    <div class="divider"></div>

    <!-- SLOTS -->
    <div class="slots">
      <div class="slot">
        <div class="slot-num">1</div>
        <div class="slot-body">
          <div class="slot-label">Equipment Name</div>
          <div class="slot-name">&nbsp;</div>
          <div class="slot-sub">&nbsp;</div>
        </div>
      </div>

      <div class="slot">
        <div class="slot-num">2</div>
        <div class="slot-body">
          <div class="slot-label">Equipment Name</div>
          <div class="slot-name">&nbsp;</div>
          <div class="slot-sub">&nbsp;</div>
        </div>
      </div>

      <div class="slot">
        <div class="slot-num">3</div>
        <div class="slot-body">
          <div class="slot-label">Equipment Name</div>
          <div class="slot-name">&nbsp;</div>
          <div class="slot-sub">&nbsp;</div>
        </div>
      </div>

      <div class="slot">
        <div class="slot-num">4</div>
        <div class="slot-body">
          <div class="slot-label">Equipment Name</div>
          <div class="slot-name">&nbsp;</div>
          <div class="slot-sub">&nbsp;</div>
        </div>
      </div>

      <div class="slot">
        <div class="slot-num">5</div>
        <div class="slot-body">
          <div class="slot-label">Equipment Name</div>
          <div class="slot-name">&nbsp;</div>
          <div class="slot-sub">&nbsp;</div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="url">primesandzooms.com</div>
      <div class="info">Have questions? Please ask for our sales team!</div>
    </div>

  </div>
</body>
</html>
