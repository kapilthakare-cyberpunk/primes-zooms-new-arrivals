<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primes & Zooms — Notice Board Strips</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  @page {
    size: 297mm 420mm;
    margin: 0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    width: 1123px;
    height: 1587px;
  }

  body {
    width: 1123px;
    height: 1587px;
    font-family: 'Open Sans', sans-serif;
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 0 60px;
  }

  .page-title {
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #cb1513;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }

  .page-sub {
    font-size: 12px;
    color: #999;
    margin-bottom: 36px;
    letter-spacing: 1px;
  }

  .strips-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .strip {
    width: 963px;
    height: 204px;
    display: flex;
    align-items: stretch;
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  .slot-num {
    background: #cb1513;
    color: #fff;
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 700;
    font-size: 36px;
    width: 85px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .strip-body {
    flex: 1;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .strip-info {
    flex: 1;
    min-width: 0;
  }

  .strip-info h3 {
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #222;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .strip-info .desc {
    font-size: 14px;
    color: #666;
    line-height: 1.3;
  }

  .qrcode-wrap {
    width: 144px;
    height: 144px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
  }

  .qrcode-wrap canvas,
  .qrcode-wrap img {
    width: 132px !important;
    height: 132px !important;
  }

  .cut-line {
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 6px;
  }

  .cut-line .dash {
    display: block;
    width: 90px;
    height: 0;
    border-top: 1.5px dashed #bbb;
  }

  .cut-line .label {
    font-size: 9px;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 600;
  }

  .page-instructions {
    margin-top: auto;
    font-size: 10px;
    color: #bbb;
    text-align: center;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="page-title">Primes &amp; Zooms — New Arrivals</div>
<div class="page-sub">Notice Board Strips · Cut &amp; Pin onto A3 Poster</div>

<div class="strips-wrap" id="stripsWrap">
  <!-- strips injected by JS -->
</div>

<div class="page-instructions">★ A3 · Print at 100% scale (no fit-to-page) · Cut strips · Pin onto notice board</div>

<script>
fetch('items.json')
  .then(response => response.json())
  .then(data => {
    const items = data.items;
    renderStrips(items);
  })
  .catch(err => console.error('Failed to load items.json:', err));

function renderStrips(items) {
  const wrap = document.getElementById('stripsWrap');
  
  items.forEach((item, i) => {
    const strip = document.createElement('div');
    strip.className = 'strip';
    strip.innerHTML = `
      <div class="slot-num">${String(item.slot).padStart(2, '0')}</div>
      <div class="strip-body">
        <div class="strip-info">
          <h3>${item.name}</h3>
          <div class="desc">${item.desc}</div>
        </div>
        <div class="qrcode-wrap" id="qr-${i}"></div>
      </div>
    `;
    wrap.appendChild(strip);

    new QRCode(document.getElementById('qr-' + i), {
      text: item.url,
      width: 132,
      height: 132,
      colorDark: '#222222',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    if (i < items.length - 1) {
      const cut = document.createElement('div');
      cut.className = 'cut-line';
      cut.innerHTML = `<span class="dash"></span><span class="label">cut</span><span class="dash"></span>`;
      wrap.appendChild(cut);
    }
  });
}
</script>

 </body>
</html>
